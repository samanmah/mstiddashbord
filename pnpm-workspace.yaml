packages:
  - "apps/*"
  - "packages/*"

verifyDepsBeforeRun: false
autoInstallPeers: true
strictPeerDependencies: false

# pnpm 11: allowBuilds جایگزین onlyBuiltDependencies است.
allowBuilds:
  esbuild: true
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  argon2: true
  "@nestjs/core": true
  sharp: true
  unrs-resolver: true
