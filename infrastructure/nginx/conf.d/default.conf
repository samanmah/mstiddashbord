# ==========================================================================
# Reverse Proxy — سامانه پایش پیشرفت پروژه‌های استراتژیک
#
#   /          → Next.js (web:3000)
#   /api       → NestJS  (api:4000)
#   /api/docs  → Swagger (api:4000)
#
# برای فعال‌سازی HTTPS، بخش server مربوط به 443 را از حالت کامنت خارج کنید
# و گواهی‌ها را در infrastructure/nginx/certs قرار دهید.
# ==========================================================================

upstream ppm_web {
    server web:3000;
    keepalive 32;
}

upstream ppm_api {
    server api:4000;
    keepalive 32;
}

# --- هدرهای امنیتی مشترک ---
map $sent_http_content_type $security_headers {
    default "1";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # برای صدور گواهی Let's Encrypt (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # در Production پس از تنظیم SSL، این خط را فعال کنید تا به HTTPS ریدایرکت شود:
    # return 301 https://$host$request_uri;

    # ---- هدرهای امنیتی ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- API (NestJS) ----
    location /api/ {
        proxy_pass http://ppm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---- فایل‌های استاتیک Next.js (کش طولانی) ----
    location /_next/static/ {
        proxy_pass http://ppm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache static_cache;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://ppm_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }
}

