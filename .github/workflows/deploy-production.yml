name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}-api
  IMAGE_WEB: ghcr.io/${{ github.repository }}-web

jobs:
  # ابتدا کیفیت کد و تست‌ها تأیید می‌شوند.
  ci:
    name: Verify (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ppm_user
          POSTGRES_PASSWORD: ppm_pass
          POSTGRES_DB: ppm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ppm_user -d ppm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ppm_user:ppm_pass@localhost:5432/ppm_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_min_32_chars_0000000000
      JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_000000000
      COOKIE_SECRET: ci_cookie_secret_min_32_chars_0000000000
      SEED_EDITOR_USERNAME: editor
      SEED_EDITOR_PASSWORD: Editor@Passw0rd!
      SEED_VIEWER_USERNAME: viewer
      SEED_VIEWER_PASSWORD: Viewer@Passw0rd!
      TZ: Asia/Tehran
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@ppm/contracts build
      - run: pnpm --filter=@ppm/api prisma:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter=@ppm/api prisma:deploy
      - run: pnpm test
      - run: pnpm --filter=@ppm/api test:integration
      - run: pnpm build

  build-push:
    name: Build & Push Images to GHCR
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api/v1
            APP_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export API_IMAGE="${{ env.IMAGE_API }}:${{ github.sha }}"
            export WEB_IMAGE="${{ env.IMAGE_WEB }}:${{ github.sha }}"

            # نگهداری تگ فعلی برای Rollback
            PREV_API=$(docker inspect --format='{{index .Config.Image}}' ppm-api 2>/dev/null || echo "")

            docker compose -f compose.production.yml pull
            # Migrationها به‌صورت خودکار در Entrypoint کانتینر API اجرا می‌شوند.
            docker compose -f compose.production.yml up -d

            # بررسی سلامت
            sleep 25
            if ! curl -fsS http://localhost/api/v1/health/readiness; then
              echo "Health check failed — rolling back"
              if [ -n "$PREV_API" ]; then
                export API_IMAGE="$PREV_API"
                docker compose -f compose.production.yml up -d
              fi
              exit 1
            fi
            echo "Deployment succeeded: ${{ github.sha }}"
            docker image prune -f
