# ==========================================================================
# Docker Compose — محیط Production (پشت Nginx Reverse Proxy)
# اجرا: docker compose -f compose.production.yml up -d
#
# متغیرها از فایل .env کنار همین فایل خوانده می‌شوند.
# ==========================================================================

services:
  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Tehran
    # پورت دیتابیس در Production منتشر نمی‌شود؛ فقط در شبکه داخلی در دسترس است.
    expose:
      - '5432'
    volumes:
      # PostgreSQL 18+: مسیر داده پیش‌فرض /var/lib/postgresql است (نه .../data).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ppm_internal

  api:
    image: ${API_IMAGE:-ghcr.io/samanmah/mstiddashbord-api:latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Tehran
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      CORS_ORIGINS: ${APP_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      # Production واقعی با HTTPS: COOKIE_SECURE=true (پیش‌فرض). Override فقط از ENV.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-false}
      APP_VERSION: ${APP_VERSION:-unknown}
      GIT_SHA: ${GIT_SHA:-unknown}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_SIZE:-20971520}
      IMPORT_TEMP_DIR: ${IMPORT_TEMP_DIR:-/tmp/ppm-import}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_EDITOR_USERNAME: ${SEED_EDITOR_USERNAME}
      SEED_EDITOR_PASSWORD: ${SEED_EDITOR_PASSWORD}
      SEED_VIEWER_USERNAME: ${SEED_VIEWER_USERNAME}
      SEED_VIEWER_PASSWORD: ${SEED_VIEWER_PASSWORD}
    expose:
      - '4000'
    volumes:
      - api_uploads:/app/uploads
    networks:
      - ppm_internal

  web:
    image: ${WEB_IMAGE:-ghcr.io/samanmah/mstiddashbord-web:latest}
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      TZ: Asia/Tehran
      PORT: 3000
      API_UPSTREAM_URL: http://api:4000
    expose:
      - '3000'
    networks:
      - ppm_internal

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - ppm_internal

volumes:
  postgres_data:
  api_uploads:
  nginx_cache:

networks:
  ppm_internal:
    driver: bridge
