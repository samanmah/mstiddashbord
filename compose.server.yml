# ==========================================================================
# Docker Compose — Server overlay
# مسیر کانونی روی سرور: /opt/ppm/compose.server.yml
# نسخهٔ داخل مخزن الگو است؛ اگر روی سرور فایل موجود باشد همان اولویت دارد.
#
# نقش: نگاشت پورت عمومی سرور. Runtime (COOKIE/TLS/NODE_ENV) در
# compose.runtime-production.yml حفظ می‌شود.
# ==========================================================================

name: ppm

services:
  nginx:
    # پورت عمومی فعلی سرور — HTTP موقت روی 1011
    # HTTPS روی 1012 در Task جدا (هنوز فعال نشود)
    ports: !override
      - '1011:80'
